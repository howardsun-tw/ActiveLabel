name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Run tests
        run: |
          xcodebuild test \
            -project ActiveLabel.xcodeproj \
            -scheme ActiveLabel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -only-testing:ActiveLabelTests
