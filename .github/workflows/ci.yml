name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Run tests
        run: |
          xcodebuild test \
            -project ActiveLabel.xcodeproj \
            -scheme ActiveLabel \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -only-testing:ActiveLabelTests
